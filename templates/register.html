<!DOCTYPE html>
<html>
<head>
    <title>Farmer Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>

<section class="auth-page">
    <div class="auth-card">
        <h1>Create Farmer Account</h1>
        <p>Register to store uploaded images and prediction history.</p>

        <form method="POST">
            <input type="text" name="name" placeholder="Farmer Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>

        <p class="auth-link">Already registered? <a href="/login">Login</a></p>
    </div>
</section>

</body>
</html>
